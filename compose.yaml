services:
  kostos:
    image: ghcr.io/shynewt/kostos:latest
    ports:
      - '3000:3000'
    volumes:
      # Keeps the same host-side database file used by older compose files.
      - ./kostos.db:/data/kostos.db
      # Automatic migration backups are written next to the database file.
      - ./backups:/data/backups
    environment:
      NODE_ENV: production
      DATABASE_URL: /data/kostos.db
